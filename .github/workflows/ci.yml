name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .
      - name: Compile source
        run: python -c "import pathlib, py_compile; [py_compile.compile(str(p), doraise=True) for p in pathlib.Path('src').rglob('*.py')]"
      - name: Run smoke tests
        run: python -m unittest discover -s tests
      - name: Check package build
        run: python -m build
      - name: Check PowerShell scripts parse
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in Get-ChildItem scripts -Filter *.ps1) {
            [scriptblock]::Create((Get-Content $file.FullName -Raw)) | Out-Null
          }

  electron-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ["20"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: electron-client/package-lock.json
      - name: Install Electron dependencies
        working-directory: electron-client
        run: npm ci
